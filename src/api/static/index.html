<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Analyst</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <h1>NBA Analyst</h1>
        <p class="subtitle">Stats, history, and XGBoost predictions</p>
      </div>
      <span id="status-pill" class="status-pill">Checking…</span>
    </header>

    <main class="chat-panel">
      <div id="messages" class="messages" aria-live="polite">
        <div class="message assistant">
          <div class="bubble">
            Ask about players, teams, or say “train a team model” to run XGBoost training.
          </div>
        </div>
      </div>

      <form id="chat-form" class="input-row">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Ask the analyst…"
          autocomplete="off"
          required
        ></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>

      <div class="quick-actions">
        <span class="quick-label">Quick prompts:</span>
        <button type="button" class="chip" data-prompt="Train a team vs team XGBoost model">Train team model</button>
        <button type="button" class="chip" data-prompt="Who has better stats this season, LeBron James or Stephen Curry?">Compare players</button>
        <button type="button" class="chip" data-prompt="Predict Lakers vs Celtics if the Lakers are home">Predict matchup</button>
      </div>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
